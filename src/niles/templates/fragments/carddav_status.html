{% if carddav_error %}
<p class="text-sm text-red-500 dark:text-red-400 py-2 mb-2">{{ carddav_error }}</p>
{% endif %}

{% if contact_count and contact_count > 0 %}
<div class="flex items-center gap-2 py-2 text-sm">
    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 shrink-0"></span>
    <span class="text-zinc-700 dark:text-zinc-300">{{ contact_count }} Kontakte synchronisiert</span>
</div>
{% if last_sync %}
<p class="text-xs text-zinc-500 dark:text-zinc-400 mb-3">Letzter Sync: {{ last_sync.strftime('%d.%m.%Y %H:%M') }}</p>
{% endif %}
{% else %}
<div class="flex items-center gap-2 py-2 text-sm text-zinc-500 dark:text-zinc-400">
    <span class="w-2.5 h-2.5 rounded-full bg-zinc-400 dark:bg-zinc-500 shrink-0"></span>
    Keine Kontakte synchronisiert
</div>
{% endif %}

<form hx-post="/ui/api/contacts/sync"
      hx-target="#carddav-status-container"
      hx-swap="innerHTML"
      class="mt-2">
    <button type="submit"
            class="px-4 py-2 text-sm text-blue-500 dark:text-blue-400 border border-blue-500 dark:border-blue-400 rounded-lg bg-transparent hover:bg-blue-50 dark:hover:bg-zinc-700 cursor-pointer transition-colors duration-150">Jetzt synchronisieren</button>
</form>
