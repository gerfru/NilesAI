<div class="flex flex-col mb-3 items-end">
    <span class="text-[0.65rem] font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-0.5 px-1">Du</span>
    <div class="max-w-[75%] px-4 py-3 rounded-2xl whitespace-pre-wrap break-words bg-blue-600 text-white">{{ user_message }}</div>
    {% if user_timestamp %}<span class="text-[0.6rem] text-gray-400 dark:text-gray-500 mt-0.5 px-1">{{ user_timestamp }}</span>{% endif %}
</div>
<div class="flex flex-col mb-3 items-start">
    <span class="text-[0.65rem] font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-0.5 px-1">Niles</span>
    <div class="max-w-[75%] px-4 py-3 rounded-2xl whitespace-pre-wrap break-words bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100 markdown">{{ assistant_message }}</div>
    {% if assistant_timestamp %}<span class="text-[0.6rem] text-gray-400 dark:text-gray-500 mt-0.5 px-1">{{ assistant_timestamp }}</span>{% endif %}
</div>
