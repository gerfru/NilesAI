<form hx-post="/ui/api/settings/caldav_calendars"
      hx-target="#toast-container" hx-swap="innerHTML"
      id="calendar-form">
    {% for col in collections %}
    <label class="flex items-center gap-2 py-2 border-b border-gray-100 dark:border-gray-700 last:border-0 cursor-pointer">
        <input type="checkbox" name="cal" value="{{ col.href }}"
               {% if selected is none or col.href in selected %}checked{% endif %}
               class="w-4 h-4 rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
        <span class="text-sm text-gray-700 dark:text-gray-300">{{ col.name }}</span>
        <span class="text-xs text-gray-400 dark:text-gray-500 ml-auto">{{ col.href }}</span>
    </label>
    {% endfor %}
    {% if collections %}
    <input type="hidden" name="value" id="cal-value">
    <button type="submit" data-calendar-save
            class="mt-3 px-4 py-2 text-sm text-blue-600 dark:text-blue-400 border border-blue-600 dark:border-blue-400 rounded-lg bg-transparent hover:bg-blue-50 dark:hover:bg-gray-700 cursor-pointer">Speichern</button>
    {% else %}
    <p class="text-sm text-gray-500 dark:text-gray-400">Keine Kalender gefunden.</p>
    {% endif %}
</form>
