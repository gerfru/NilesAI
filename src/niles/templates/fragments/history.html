{% if has_more %}
<div id="load-more-container" class="text-center mb-4">
    <button hx-get="/ui/api/chat/history?offset={{ next_offset }}"
            hx-target="#load-more-container"
            hx-swap="outerHTML"
            class="text-sm text-blue-500 dark:text-blue-400 border border-blue-500 dark:border-blue-400 rounded-lg px-4 py-2 bg-transparent hover:bg-blue-50 dark:hover:bg-zinc-800 cursor-pointer transition-colors duration-150">
        Aeltere Nachrichten laden
    </button>
</div>
{% endif %}
{% for msg in messages %}
<div class="mb-5">
    <div class="flex items-baseline gap-2 mb-1">
        <span class="text-xs font-semibold text-zinc-500 dark:text-zinc-400">{% if msg.role == 'user' %}Du{% else %}Niles{% endif %}</span>
        {% if msg.timestamp %}<span class="text-[0.6rem] text-zinc-400 dark:text-zinc-500" data-iso="{{ msg.timestamp }}"></span>{% endif %}
    </div>
    <div class="whitespace-pre-wrap break-words {% if msg.role == 'user' %}px-4 py-3 rounded-xl bg-blue-50 dark:bg-blue-950 text-zinc-900 dark:text-zinc-100{% else %}text-zinc-900 dark:text-zinc-100 markdown{% endif %}">{{ msg.content }}</div>
</div>
{% endfor %}
