{% if wa_status == "connected" %}
<div class="flex items-center gap-3 py-2">
    <span class="flex items-center gap-2 text-sm text-emerald-600 dark:text-emerald-400 font-medium">
        <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 shrink-0"></span>
        Verbunden{% if wa_phone %} ({{ wa_phone }}){% endif %}
    </span>
</div>
<form hx-post="/ui/api/whatsapp/disconnect"
      hx-target="#whatsapp-container"
      hx-swap="innerHTML"
      hx-confirm="WhatsApp wirklich trennen?"
      class="mt-2">
    <button type="submit"
            class="px-4 py-2 text-sm text-red-500 dark:text-red-400 border border-red-500 dark:border-red-400 rounded-lg bg-transparent hover:bg-red-50 dark:hover:bg-zinc-700 cursor-pointer transition-colors duration-150">Trennen</button>
</form>

{% elif wa_status == "connecting" %}
<div class="flex items-center gap-2 py-2 text-sm text-amber-600 dark:text-amber-400 font-medium">
    <span class="w-2.5 h-2.5 rounded-full bg-amber-500 shrink-0 animate-pulse"></span>
    Warte auf QR-Code Scan...
</div>
{% if wa_qr %}
<div class="mt-3 flex justify-center">
    <img src="{{ wa_qr }}" alt="WhatsApp QR-Code" class="rounded-lg border border-zinc-200 dark:border-zinc-600" width="256" height="256">
</div>
<p class="text-xs text-zinc-500 dark:text-zinc-400 text-center mt-2">Oeffne WhatsApp &gt; Einstellungen &gt; Verknuepfte Geraete &gt; Geraet hinzufuegen</p>
{% endif %}
<div hx-get="/ui/api/whatsapp/status"
     hx-target="#whatsapp-container"
     hx-swap="innerHTML"
     hx-trigger="every 3s">
</div>

{% else %}
<div class="flex items-center gap-2 py-2 text-sm text-zinc-500 dark:text-zinc-400">
    <span class="w-2.5 h-2.5 rounded-full bg-zinc-400 dark:bg-zinc-500 shrink-0"></span>
    Nicht verbunden
</div>
<form hx-post="/ui/api/whatsapp/connect"
      hx-target="#whatsapp-container"
      hx-swap="innerHTML"
      class="mt-2">
    <button type="submit"
            class="px-4 py-2 text-sm text-white bg-emerald-500 hover:bg-emerald-600 rounded-lg cursor-pointer transition-colors duration-150">WhatsApp verbinden</button>
</form>
{% endif %}
