name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run --extra dev ruff check src/ tests/

      - name: Ruff format check
        run: uv run --extra dev ruff format --check src/ tests/

      - name: mypy
        run: uv run --extra dev mypy src/niles/

      - name: Run tests with coverage
        env:
          EVOLUTION_POSTGRES_PASSWORD: test-password
          EVOLUTION_API_KEY: test-api-key
          NILES_API_KEY: test-niles-key
        run: uv run --extra dev pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
