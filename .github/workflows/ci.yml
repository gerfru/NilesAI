name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run --extra dev ruff check src/ tests/

      - name: Ruff format check
        run: uv run --extra dev ruff format --check src/ tests/

      - name: mypy
        run: uv run --extra dev mypy src/niles/

      - name: Run tests with coverage
        env:
          EVOLUTION_POSTGRES_PASSWORD: test-password
          EVOLUTION_API_KEY: test-api-key
          NILES_API_KEY: test-niles-key
        run: uv run --extra dev pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-report
          path: coverage.xml

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@ddc015e5ed99942b2253d8ea16a0586a01ef2ab1  # v3.88.0
        with:
          extra_args: --results=verified,unknown

  trivy-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Build Docker image
        run: docker build -t niles-core:ci -f docker/Dockerfile.niles .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518  # v0.34.1
        with:
          image-ref: niles-core:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
