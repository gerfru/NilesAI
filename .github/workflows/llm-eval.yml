name: LLM Eval (nightly)

# Golden-dataset tool-selection regression gate. Runs on a SELF-HOSTED runner
# (Mac Mini) against the real local Ollama (llama3.1:8b) — tools are mocked, so
# no DB is needed.
#
# Manual-only (workflow_dispatch): the runner is on-demand (no autostart), so a
# nightly schedule would just queue runs with no online runner. Start the runner
# (cd ~/actions-runner-niles && ./run.sh), then trigger this workflow. There is
# deliberately no pull_request trigger → a self-hosted runner on a public repo
# never executes untrusted fork code.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  golden-eval:
    # Adjust the label set to match your registered runner (e.g. [self-hosted, macOS]).
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run golden-dataset evals
        # Individual case failures must not fail the job — the baseline gate decides.
        continue-on-error: true
        env:
          LLM_BASE_URL: http://localhost:11434/v1
        run: uv run --extra dev pytest -m llm_eval --json-report --json-report-file=eval-report.json

      - name: Gate on baseline
        run: uv run python tests/evals/eval_gate.py eval-report.json tests/evals/baseline.json

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: llm-eval-report
          path: eval-report.json
          retention-days: 90
