name: SBOM

on:
  push:
    # release-please tags are prefixed with the package name (e.g. niles-core-v0.2.1);
    # "*-v*" matches those, "v*" keeps legacy/manual tags (v0.1.0, v0.2.2) working.
    tags: ["*-v*", "v*"]

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0

      - name: Generate SBOM
        run: syft dir:. -o cyclonedx-json=sbom.cdx.json

      - name: Upload SBOM as release asset
        run: gh release upload "$TAG_NAME" sbom.cdx.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
