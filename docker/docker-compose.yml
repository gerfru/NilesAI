# Niles AI - Complete Docker Setup
# Services: Niles Core + Evolution API + PostgreSQL + Caddy

services:
  # PostgreSQL for Evolution API
  evolution_postgres:
    container_name: niles_evolution_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    # Port not exposed -- access only via Docker network
    # For local debugging: ports: ["127.0.0.1:5432:5432"]
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
      POSTGRES_DB: evolution_db
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - niles_network

  # Evolution API (WhatsApp)
  evolution_api:
    container_name: niles_evolution_api
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    # No port exposed -- access only via Caddy reverse proxy (HTTPS :8443)
    environment:
      # API Authentication
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}

      # Database Configuration
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD}@evolution_postgres:5432/evolution_db?schema=evolution_api"
      DATABASE_CONNECTION_CLIENT_NAME: "niles_evolution"

      # Data Persistence
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"

      # Cache
      CACHE_REDIS_ENABLED: "false"

      # WhatsApp Version (disabled - causes group message issues)
      # CONFIG_SESSION_PHONE_VERSION: ""
    volumes:
      - ~/.evolution/instances:/evolution/instances
    networks:
      - niles_network
    depends_on:
      - evolution_postgres

  # Caddy Reverse Proxy (HTTPS termination)
  caddy:
    container_name: niles_caddy
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - niles_network
    depends_on:
      - niles_core
      - evolution_api

  # Niles AI Core
  niles_core:
    container_name: niles_core
    build:
      context: ..
      dockerfile: docker/Dockerfile.niles
    restart: unless-stopped
    # No port exposed -- access only via Caddy reverse proxy (HTTPS :443)
    environment:
      - PYTHONPATH=/app/src
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_POSTGRES_PASSWORD=${EVOLUTION_POSTGRES_PASSWORD}
      - NILES_API_KEY=${NILES_API_KEY:-}
      - CARDDAV_URL=${CARDDAV_URL:-}
      - CARDDAV_USER=${CARDDAV_USER:-}
      - CARDDAV_PASSWORD=${CARDDAV_PASSWORD:-}
      - FEATURE_CARDDAV_SYNC=${FEATURE_CARDDAV_SYNC:-false}
      - CALDAV_URL=${CALDAV_URL:-}
      - CALDAV_USER=${CALDAV_USER:-}
      - CALDAV_PASSWORD=${CALDAV_PASSWORD:-}
      - FEATURE_CALDAV_SYNC=${FEATURE_CALDAV_SYNC:-false}
      - TIMEZONE=${TIMEZONE:-Europe/Vienna}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_ALLOWED_EMAILS=${GOOGLE_ALLOWED_EMAILS:-}
    volumes:
      - ../src:/app/src
      - ../config:/app/config:ro
    command: uvicorn niles.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - niles_network
    depends_on:
      - evolution_postgres
      - evolution_api

volumes:
  evolution_postgres:
  caddy_data:
  caddy_config:

networks:
  niles_network:
    driver: bridge
