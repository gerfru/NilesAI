# Niles AI - Complete Docker Setup
# Services: Niles Core + Evolution API + PostgreSQL
# HTTPS termination handled by homelab-gateway (external Caddy)

services:
  # PostgreSQL for Evolution API
  evolution_postgres:
    container_name: niles_evolution_postgres
    image: pgvector/pgvector:pg15@sha256:bd12d6788a617f4147d5a2ae0b56d07921398adabfe5a033bd3f50c245df55a1
    restart: unless-stopped
    # Postgres port: loopback only, random port by default (not discoverable).
    # For debugging, set in .env: POSTGRES_HOST_PORT=5432
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-0}:5432"
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
      POSTGRES_DB: evolution_db
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - niles_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Evolution API (WhatsApp)
  evolution_api:
    container_name: niles_evolution_api
    image: evoapicloud/evolution-api@sha256:e15508de128b9ab232d9cabb2441ca897a4802fba2c8186ed384b4f4508767d9  # v2.3.7
    restart: unless-stopped
    # No port exposed -- access via gateway-caddy reverse proxy
    environment:
      # API Authentication
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}

      # Database Configuration
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD}@evolution_postgres:5432/evolution_db?schema=evolution_api"
      DATABASE_CONNECTION_CLIENT_NAME: "niles_evolution"

      # Data Persistence — NEW_MESSAGE required for findMessages API
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"

      # Cache
      CACHE_REDIS_ENABLED: "false"

      # WhatsApp Version (disabled - causes group message issues)
      # CONFIG_SESSION_PHONE_VERSION: ""
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - niles_network
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "monitoring=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    depends_on:
      evolution_postgres:
        condition: service_healthy

  # Vikunja (Todo/Task Management)
  vikunja:
    image: vikunja/vikunja@sha256:9e664c859f30c605c454aeb8712494ec20550a8e5220cb2d509e49a85d3effd4  # 1.1.0
    container_name: vikunja
    # Root required: upstream vikunja image writes to /app/vikunja/files as root;
    # non-root user causes permission errors on the named volume.
    # Mitigated: read_only + no-new-privileges reduce root attack surface.
    # TODO: Track upstream for non-root support (vikunja/vikunja#2205)
    user: "0:0"
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    tmpfs:
      - /tmp
      - /.cache
    environment:
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: evolution_postgres
      VIKUNJA_DATABASE_USER: evolution
      VIKUNJA_DATABASE_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
      VIKUNJA_DATABASE_DATABASE: vikunja_db
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_PUBLIC_URL:-https://localhost:3457}
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "true"  # Set to "false" after initial account setup
      VIKUNJA_SERVICE_JWTSECRET: ${VIKUNJA_JWT_SECRET}
      VIKUNJA_CORS_ENABLE: "false"
    # No port exposed -- access via gateway-caddy reverse proxy
    volumes:
      - vikunja_files:/app/vikunja/files
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3456/api/v1/info || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    depends_on:
      evolution_postgres:
        condition: service_healthy
    networks:
      - niles_network
      - proxy
    restart: unless-stopped

  # Signal (signal-cli-rest-api) — activate via Settings UI (feature_signal)
  # CI build with signal-cli v0.13.24 + aarch64 native libs
  # Note-to-Self self-chat bug NOT yet fixed (upstream signal-cli #1930)
  signal_api:
    container_name: niles_signal_api
    image: bbernhard/signal-cli-rest-api@sha256:419d08b18db00ecabd30386765662330fda85bdacc7c302f0cd541244895aeb5  # 1771797934-ci
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - MODE=json-rpc
    volumes:
      - signal_cli_config:/home/.local/share/signal-cli
    networks:
      - niles_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/about || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # SearXNG (Privacy-focused meta search engine) — activate via --profile search
  searxng:
    image: searxng/searxng@sha256:4baf815fff29c6ba8b2f41625deea54f8b1e9371d5c670ca510eebc7d0153883  # 2025.5.10-1b787ed35
    container_name: niles_searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      # Required: generate with `openssl rand -hex 32` and set in .env.
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:?SEARXNG_SECRET_KEY must be set (openssl rand -hex 32)}
    volumes:
      - searxng_data:/etc/searxng
      - ../config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - niles_network
    profiles:
      - search
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Langfuse (LLM Tracing, opt-in) — activate with: docker compose --profile langfuse up -d
  # Access: http://localhost:3000  |  Credentials: set via LANGFUSE_* env vars
  langfuse:
    image: langfuse/langfuse:2
    container_name: niles_langfuse
    restart: unless-stopped
    profiles:
      - langfuse
    environment:
      DATABASE_URL: postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD}@evolution_postgres:5432/langfuse_db
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-}
      SALT: ${LANGFUSE_SALT:-}
      NEXTAUTH_URL: ${LANGFUSE_URL:-http://localhost:3000}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - niles_network
    depends_on:
      evolution_postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Niles AI Core
  niles_core:
    container_name: niles_core
    image: niles-core:${NILES_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.niles
    restart: unless-stopped
    # No port exposed -- access via gateway-caddy reverse proxy
    environment:
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_POSTGRES_PASSWORD=${EVOLUTION_POSTGRES_PASSWORD}
      - NILES_API_KEY=${NILES_API_KEY:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - BASE_URL=${BASE_URL:-}
      - CARDDAV_URL=${CARDDAV_URL:-}
      - CARDDAV_USER=${CARDDAV_USER:-}
      - CARDDAV_PASSWORD=${CARDDAV_PASSWORD:-}
      - FEATURE_CARDDAV_SYNC=${FEATURE_CARDDAV_SYNC:-false}
      - CALDAV_URL=${CALDAV_URL:-}
      - CALDAV_USER=${CALDAV_USER:-}
      - CALDAV_PASSWORD=${CALDAV_PASSWORD:-}
      - FEATURE_CALDAV_SYNC=${FEATURE_CALDAV_SYNC:-false}
      - TIMEZONE=${TIMEZONE:-Europe/Vienna}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-llama3.1:8b}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_ALLOWED_EMAILS=${GOOGLE_ALLOWED_EMAILS:-}
      - VIKUNJA_API_URL=${VIKUNJA_API_URL:-}
      - VIKUNJA_PUBLIC_URL=${VIKUNJA_PUBLIC_URL:-}
      - FEATURE_WHATSAPP_SEND_OTHERS=${FEATURE_WHATSAPP_SEND_OTHERS:-true}
      - SIGNAL_API_URL=${SIGNAL_API_URL:-http://signal_api:8080}
      - SIGNAL_PHONE_NUMBER=${SIGNAL_PHONE_NUMBER:-}
      - FEATURE_SIGNAL=${FEATURE_SIGNAL:-false}
      - FEATURE_SIGNAL_SEND_OTHERS=${FEATURE_SIGNAL_SEND_OTHERS:-false}
      - BRIEFING_CHANNEL=${BRIEFING_CHANNEL:-whatsapp}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FEATURE_SEARCH=${FEATURE_SEARCH:-false}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      - FEATURE_NOTION=${FEATURE_NOTION:-false}
      - NOTION_TOKEN=${NOTION_TOKEN:-}
      - NOTION_SYNC_INTERVAL=${NOTION_SYNC_INTERVAL:-30}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}  # WARNING: empty = credentials stored unencrypted
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    volumes:
      - ../config:/app/config:ro
    networks:
      - niles_network
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "monitoring=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      evolution_postgres:
        condition: service_healthy
      evolution_api:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

volumes:
  evolution_postgres:
  evolution_instances:
  vikunja_files:
  signal_cli_config:
  searxng_data:

networks:
  niles_network:
    driver: bridge
  proxy:
    external: true
