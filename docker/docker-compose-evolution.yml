version: '3.9'

services:
  postgres:
    container_name: evolution_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
      POSTGRES_DB: evolution_db
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - evolution_network

  evolution-api:
    container_name: evolution_api
    image: atendai/evolution-api:v2.1.1
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # API Authentication
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}

      # Database Configuration
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD}@postgres:5432/evolution_db?schema=evolution_api"
      DATABASE_CONNECTION_CLIENT_NAME: "niles_evolution"

      # Data Persistence (minimal)
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"

      # Disable Redis Cache (optional)
      CACHE_REDIS_ENABLED: "false"

      # WhatsApp Version (leave empty for auto-update)
      CONFIG_SESSION_PHONE_VERSION: ""
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution_network
    depends_on:
      - postgres

volumes:
  evolution_postgres:
  evolution_instances:

networks:
  evolution_network:
    driver: bridge
