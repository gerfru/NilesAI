# MCP Server Configuration
# Tools from configured servers are automatically available to the agent.
# Built-in tools (contacts, whatsapp, memory) are always active.
#
# Format:
#   servers:
#     <name>:
#       command: <executable>
#       args: [<arg1>, <arg2>, ...]
#       env:                          # optional
#         KEY: "${ENV_VAR}"           # ${VAR} expands from environment

servers:
  weather:
    command: python
    args: ["-m", "niles.mcp.weather"]
    env:
      WEATHER_LATITUDE: "${WEATHER_LATITUDE}"
      WEATHER_LONGITUDE: "${WEATHER_LONGITUDE}"
      WEATHER_TIMEZONE: "${WEATHER_TIMEZONE}"

