general:
  instance_name: "Niles Search"
  debug: false

search:
  safe_search: 0
  default_lang: "de"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "${SEARXNG_SECRET_KEY}"

doi_resolvers:
  oadoi.org: 'https://oadoi.org/'
  doi.org: 'https://doi.org/'

default_doi_resolver: 'oadoi.org'

# No 'engines' section — SearXNG uses its defaults (92 engines including
# Google, Bing, DuckDuckGo, Wikipedia, Brave, Qwant, Startpage, etc.)
