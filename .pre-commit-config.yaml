repos:
  # --- Secret Scanning (gitleaks) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.27.2
    hooks:
      - id: gitleaks

  # --- General Hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: no-commit-to-branch
        args: [--branch, main]

  # --- PII / IP Address Scanning (Niles-specific) ---
  - repo: local
    hooks:
      - id: check-pii
        name: PII Check (IPs, Hostnames)
        entry: scripts/check-pii.sh
        language: system
        stages: [pre-commit]
        pass_filenames: false

  # --- SAST (bandit) ---
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-r, src/niles/, --skip, "B101,B105,B314,B324,B405,B608"]
        pass_filenames: false
        files: ^src/niles/

  # --- Python Linting ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # --- SAST (semgrep) ---
  - repo: local
    hooks:
      - id: semgrep
        name: semgrep
        entry: semgrep
        language: python
        additional_dependencies: [semgrep==1.164.0]
        args: [scan, src/niles/, --config, p/python, --config, p/owasp-top-ten, --error]
        pass_filenames: false
        files: ^src/niles/.*\.py$

  # --- Static Type Checking ---
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy src/niles/
        language: system
        types: [python]
        args: [--config-file=pyproject.toml]
        pass_filenames: false
