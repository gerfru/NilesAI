# .pre-commit-config.yaml
repos:
  # --- Secret Scanning ---
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.88.0  # Check latest version: https://github.com/trufflesecurity/trufflehog/releases
    hooks:
      - id: trufflehog
        name: TruffleHog Secret Scan
        entry: trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail
        language: system
        stages: [pre-commit]

  # --- PII / IP Address Scanning ---
  - repo: local
    hooks:
      - id: check-pii
        name: PII Check (IPs, Hostnames)
        entry: scripts/check-pii.sh
        language: system
        stages: [pre-commit]
        pass_filenames: false

  # --- Python Linting ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6  # Check latest version: https://github.com/astral-sh/ruff-pre-commit/releases
    hooks:
      - id: ruff
        name: Ruff Lint
        args: [--fix]
      - id: ruff-format
        name: Ruff Format

  # --- Static Type Checking ---
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/niles/
        language: system
        types: [python]
        args: [--config-file=pyproject.toml]
        pass_filenames: false